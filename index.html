<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Cardápio Digital</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #ff9966, #ff5e62);
            margin: 0;
            padding: 0;
            color: #333;
        }

        .cardapio {
            background-color: #ffffff;
            width: 80%;
            margin: 30px auto;
            padding: 20px;
            border: 3px solid #ff5e62;
            border-radius: 10px;
        }

        h1 {
            text-align: center;
            color: #ff5e62;
            font-family: 'Verdana', sans-serif;
        }

        h2 {
            color: #ff9966;
            margin-top: 20px;
        }

        ul {
            list-style-type: square;
            padding: 10px;
            margin: 10px;
            background-color: #f9f9f9;
            border: 1px solid #ccc;
        }

        li {
            margin: 5px 0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: center;
        }

        th {
            background-color: #ff5e62;
            color: white;
        }

        tr:nth-child(even) {
            background-color: #f2f2f2;
        }

        tr:hover {
            background-color: #ffe0db;
        }
    </style>
</head>
<body>

<div class="cardapio">
    <h1>🍔 Lanchonete Sabor & Cia</h1>

    <h2>🔥 Lanches</h2>
    <ul>
        <li>X-Burguer</li>
        <li>X-Salada</li>
        <li>X-Bacon</li>
        <li>Hambúrguer Vegano</li>
    </ul>

    <h2>💲 Tabela de Preços</h2>
    <table>
        <tr>
            <th>Item</th>
            <th>Preço</th>
        </tr>
        <tr>
            <td>X-Burguer</td>
            <td>R$ 12,00</td>
        </tr>
        <tr>
            <td>X-Salada</td>
            <td>R$ 14,00</td>
        </tr>
        <tr>
            <td>X-Bacon</td>
            <td>R$ 16,00</td>
        </tr>
        <tr>
            <td>Hambúrguer Vegano</td>
            <td>R$ 18,00</td>
        </tr>
    </table>
</div>

</body>
</html>
