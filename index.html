<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Cardápio Digital</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, rgb(157, 201, 216), rgb(3, 169, 235));
            margin: 0;
            padding: 0;
            color: #333;
        }

        .cardapio {
            background-color: #ffffff;
            width: 80%;
            margin: 30px auto;
            padding: 20px;
            border: 3px solid #000000;
            border-radius: 10px;
        }

        h1 {
            text-align: center;
            color: #000000;
            font-family: 'Verdana', sans-serif;
        }

        h2 {
            color: #000000;
            margin-top: 20px;
        }

        ul {
            list-style-type: square;
            padding: 10px;
            margin: 10px;
            background-color: #f9f9f9;
            border: 1px solid #ccc;
        }

        li {
            margin: 5px 0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: center;
        }

        th {
            background-color: #000000;
            color: white;
        }

        tr:nth-child(even) {
            background-color: #f2f2f2;
        }

        tr:hover {
            background-color: #ffe0db;
        }
    </style>
</head>
<body>

<div class="cardapio">
    <h1> Lanchonete tempero da vovo juju</h1>

    <h2> Lanches</h2>
    <ul>
        <li>sopa de osso</li>
        <li>xtudo de cachorro</li>
        <li>cachorro quente de ovo</li>
        <li>Hambúrguer de pao</li>
    </ul>

    <h2> Tabela de Preços</h2>
    <table>
        <tr>
            <th>Item</th>
            <th>Preço</th>
        </tr>
        <tr>
            <td>Sopa de osso</td>
            <td>R$ 50,00</td>
        </tr>
        <tr>
            <td>xtudo de cachorro</td>
            <td>R$ 14,00</td>
        </tr>
        <tr>
            <td>cachorro quente de ovo</td>
            <td>R$ 66,66</td>
        </tr>
        <tr>
            <td>Hambúrguer de pao</td>
            <td>R$ 81,00</td>
        </tr>
    </table>
</div>

</body>
</html>
